spring:
  application:
    name: engine
  datasource:
    url: jdbc:sqlserver://localhost;databaseName=EsportsTournamentDB;encrypt=true;trustServerCertificate=true
    username: sa
    password: sa
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

server:
  port: 8081

pandascore:
  api-key: ${PANDASCORE_API_KEY:YOUR_API_KEY_HERE}
  base-url: https://api.pandascore.co
