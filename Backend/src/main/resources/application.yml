spring:
  application:
    name: engine
  datasource:
    url: jdbc:sqlserver://[IP_ADDRESS];databaseName= ;encrypt=true;trustServerCertificate=true
    username: 
    password: 
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

server:
  port: 8081
